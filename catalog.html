    const phaseIdMap = Object.fromEntries(phases.map((phase) => [phase.label, phase.id]));

    function renderMenu() {
      return phases.map((phase) => `
        <a class="phaseLink" href="#${phase.id}">
          <span class="phaseLinkBar"></span>
          <span class="phaseLinkText">${phase.label}</span>
        </a>
      `).join('');
    }

    function renderCards(phaseLabel) {
      const phaseAgents = agents.filter((agent) => agent.phase === phaseLabel);

      if (phaseAgents.length === 0) {
        return '<p class="emptyText">このフェーズのエージェントはまだ登録されていません。</p>';
      }

      return phaseAgents.map((agent) => `
        <article class="card">
          <div class="cardTop ${agent.accentClass}">
            <div class="cardIcon">${agent.icon}</div>
            <div class="cardTitleArea">
              <h3 class="cardTitle">${agent.name}</h3>
              <div class="cardCompany">AI Agent Catalog</div>
            </div>
          </div>

          <div class="cardBody">
            <div class="summaryRow">
              <span class="summaryLabel">説明</span>
              <p class="summaryText">${agent.summary}</p>
            </div>

            <ul class="bulletList">
              ${agent.bullets.map((bullet) => `<li class="bulletItem">${bullet}</li>`).join('')}
            </ul>
          </div>

          <div class="cardMeta">
            <div class="metaBlock">
              <span class="metaLabel">想定ユーザー</span>
              <span class="metaValue">${agent.userType}</span>
            </div>

            <div class="metaBlock">
              <span class="metaLabel">使用フェーズ</span>
              <span class="metaValue">${agent.phase}</span>
            </div>
          </div>

          <div class="cardFooter">
            <button type="button" class="ctaButton" data-agent-name="${agent.name}">${agent.ctaLabel}</button>
            <div class="updatedAt">最終更新日: ${agent.updatedAt}</div>
          </div>
        </article>
      `).join('');
    }

    function renderSections() {
      return phases.map((phase) => `
        <section id="${phase.id}" class="phaseSection">
          <div class="phaseHeader">
            <h2 class="phaseTitle">${phase.label}</h2>
            <p class="phaseDescription">${phase.label}で活用できるAIエージェント一覧</p>
          </div>
          <div class="cardGrid">
            ${renderCards(phase.label)}
          </div>
        </section>
      `).join('');
    }

    function renderPage() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="catalogPage">
          <div class="topBar">
            <a class="backCircle" href="./index.html" aria-label="トップページへ戻る">←</a>
            <div class="brandArea">
              <div class="brandLogo">AI</div>
              <div class="brandText">AI AGENT CATALOG</div>
            </div>
          </div>

          <div class="pageHeader">
            <h1 class="pageTitle">フェーズ別 AIエージェント</h1>
            <p class="pageLead">
              業務フェーズごとにAIエージェントを整理したカタログサイトです。
              左メニューから該当フェーズへ移動し、用途に合うエージェントをすぐ見つけられます。
            </p>
          </div>

          <div class="pageLayout">
            <aside class="sidebar">
              <div class="sidebarCard">
                <h2 class="sidebarTitle">使用フェーズ</h2>
                <nav class="phaseMenu">
                  ${renderMenu()}
                </nav>
              </div>
            </aside>

            <main class="contentArea">
              ${renderSections()}
            </main>
          </div>
        </div>
      `;

      document.querySelectorAll('.ctaButton').forEach((button) => {
        button.addEventListener('click', () => {
          const agentName = button.getAttribute('data-agent-name');
          alert(`「${agentName}」の起動先や詳細画面は、今後ここに接続できます。`);
        });
      });
    }

    renderPage();
